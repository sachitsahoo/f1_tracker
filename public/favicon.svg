<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0f0f0f"/>

  <!-- Ferrari-red accent ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#E8002D" stroke-width="2"/>

  <!-- Checkered flag squares — top-left quadrant (4 cells) -->
  <rect x="7"  y="7"  width="4" height="4" fill="#ffffff" opacity="0.9"/>
  <rect x="11" y="7"  width="4" height="4" fill="#E8002D" opacity="0.9"/>
  <rect x="7"  y="11" width="4" height="4" fill="#E8002D" opacity="0.9"/>
  <rect x="11" y="11" width="4" height="4" fill="#ffffff" opacity="0.9"/>

  <!-- Checkered flag squares — bottom-right quadrant (4 cells) -->
  <rect x="17" y="17" width="4" height="4" fill="#ffffff" opacity="0.9"/>
  <rect x="21" y="17" width="4" height="4" fill="#E8002D" opacity="0.9"/>
  <rect x="17" y="21" width="4" height="4" fill="#E8002D" opacity="0.9"/>
  <rect x="21" y="21" width="4" height="4" fill="#ffffff" opacity="0.9"/>

  <!-- Diagonal separator stripe -->
  <line x1="7" y1="25" x2="25" y2="7" stroke="#E8002D" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
